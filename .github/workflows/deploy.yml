name: Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout devops code
      uses: actions/checkout@v3

    - name: Checkout microservice code
      uses: actions/checkout@v3
      with:
        repository: your-github-username/microservice
        path: microservice

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push Docker image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: microservice
      run: |
        cd microservice
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --region us-east-1 --name my-cluster

    - name: Install Helm
      run: |
        curl https://get.helm.sh/helm-v3.9.0-linux-amd64.tar.gz -o helm.tar.gz
        tar -zxvf helm.tar.gz
        sudo mv linux-amd64/helm /usr/local/bin/helm

    - name: Deploy with Helm
      run: |
        helm upgrade --install microservice ./helm/microservice --set image.repository=$ECR_REGISTRY/$ECR_REPOSITORY
        helm upgrade --install log-collector ./helm/log-collector
        helm upgrade --install nats-consumer ./helm/nats-consumer
        kubectl apply -f ./manifests/nats-pod.yaml