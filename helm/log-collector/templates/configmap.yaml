apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              tail
        Path              /var/log/containers/*microservice*.log
        Parser            docker
        Tag               microservice.*
        Refresh_Interval  5

    [OUTPUT]
        Name  opensearch
        Match *
        Host  {{ .Values.opensearch.host }}
        Port  {{ .Values.opensearch.port }}
        Index microservice-logs